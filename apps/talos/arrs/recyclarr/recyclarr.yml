# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json

sonarr:

  web-1080p-v4:
    base_url: !secret sonarr_url
    api_key: !secret sonarr_apikey

    delete_old_custom_formats: true
    replace_existing_custom_formats: true

    include:
      - template: sonarr-quality-definition-series
      # 720p + 1080p (WEB / Bluray / HDTV). Profile is still named "WEB-1080p".
      - template: sonarr-v4-quality-profile-web-1080p-alternative

    # Sizes are MB per minute of runtime, so per-episode totals scale with
    # episode length. At 45 min: preferred ~0.8 GB, max ~2.0 GB; at 60 min:
    # preferred ~1.1 GB, max ~2.7 GB. min is a permissive floor, not a target.
    quality_definition:
      type: series
      qualities:
        - name: WEBDL-1080p
          min: 3
          preferred: 18
          max: 45
        - name: WEBRip-1080p
          min: 3
          preferred: 18
          max: 45
        - name: HDTV-1080p
          min: 3
          preferred: 18
          max: 45
        - name: Bluray-1080p
          min: 3
          preferred: 18
          max: 45
        - name: WEBDL-720p
          min: 2
          preferred: 12
          max: 35
        - name: WEBRip-720p
          min: 2
          preferred: 12
          max: 35
        - name: HDTV-720p
          min: 2
          preferred: 12
          max: 35
        - name: Bluray-720p
          min: 2
          preferred: 12
          max: 35

    custom_formats:
      # Optional
      - trash_ids:
          - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
          - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
          - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
          - 06d66ab109d4d2eddb2794d21526d140 # Retags
          - 1b3994c551cbb92a2c781af061f4ab44 # Scene
        assign_scores_to:
          - name: WEB-1080p

radarr:
  main:
    base_url: !secret radarr_url
    api_key: !secret radarr_apikey

    delete_old_custom_formats: true
    replace_existing_custom_formats: true

    include:
      # Comment out any of the following includes to disable them
      - template: radarr-quality-definition-movie
      # Bluray-1080p + WEB 1080p + Bluray-720p. No Remux (Remux = 30-60 GB).
      - template: radarr-quality-profile-hd-bluray-web
      - template: radarr-custom-formats-hd-bluray-web

    # Sizes are MB per minute of runtime, so totals scale with film length.
    # At 115 min: preferred ~1.5 GB, max ~3.45 GB; at 90 min: preferred ~1.2 GB,
    # max ~2.7 GB. min is a permissive floor so good 720p files aren't rejected.
    quality_definition:
      type: movie
      qualities:
        - name: Bluray-1080p
          min: 3
          preferred: 13
          max: 30
        - name: WEBDL-1080p
          min: 3
          preferred: 13
          max: 30
        - name: WEBRip-1080p
          min: 3
          preferred: 13
          max: 30
        - name: Bluray-720p
          min: 2
          preferred: 10
          max: 25

    custom_formats:
      # Optional
      - trash_ids:
          - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
          - 90cedc1fea7ea5d11298bebd3d1d3223 # EVO (no WEBDL)
          - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
          - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
          - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
          - f537cf427b64c38c8e36298f657e4828 # Scene
        assign_scores_to:
          - name: HD Bluray + WEB

      # Allow x265 (HD): the hd-bluray-web template scores it negative, which
      # blocks it. Override to 0 so the smaller HEVC files are accepted.
      - trash_ids:
          - dc98083864ea246d05a42df0d05f81cc # x265 (HD)
        assign_scores_to:
          - name: HD Bluray + WEB
            score: 0
